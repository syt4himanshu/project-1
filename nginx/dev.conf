# Dev reverse proxy — include from repo root: nginx -c $(pwd)/nginx/dev.conf
# Requires `events` + `http` wrapper for a valid standalone config.

events {
    worker_connections 1024;
}

http {
    server {
        listen 3005;
        server_name localhost;

        # /api/ MUST be first — prevents SPA path shadowing bug.
        # Without this order, /student/me routes to Vite not Express.
        location /api/ {
            proxy_pass http://127.0.0.1:5002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location /student/ {
            proxy_pass http://127.0.0.1:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /faculty/ {
            proxy_pass http://127.0.0.1:5174;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /admin/ {
            proxy_pass http://127.0.0.1:5176;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location = / {
            return 302 /student/;
        }
    }
}
