server {
    listen 80;
    listen [::]:80;
    server_name kys.stvincentngp.edu.in;

    location /.well-known/acme-challenge/ {
        root /var/www/kys.stvincentngp.edu.in/kys-frontend/dist;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kys.stvincentngp.edu.in;

    root /var/www/kys.stvincentngp.edu.in/kys-frontend/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/kys.stvincentngp.edu.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kys.stvincentngp.edu.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /api/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
